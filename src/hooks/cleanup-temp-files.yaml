name: cleanup-temp-files
description: Clean up temporary tracking files on task completion
event: stop
action:
  type: script
  script: |
    #!/bin/bash
    set -euo pipefail
    
    # Remove temporary tracking files
    rm -f .harness-tool-count.tmp
    rm -f .harness-modified-files.tmp
    
    # Log cleanup
    echo "[$(date '+%Y-%m-%d %H:%M:%S')] Cleaned up temporary tracking files" >> .harness-log.txt
    
    exit 0
