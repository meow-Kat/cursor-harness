name: detect-secret-leak
description: Detect potential secrets in file writes (API keys, passwords, tokens)
event: preToolUse
toolTypes:
  - write
action:
  type: script
  script: |
    #!/bin/bash
    set -euo pipefail
    input=$(cat)
    
    # Extract content being written
    content=$(echo "$input" | jq -r '.text // .content // empty')
    file_path=$(echo "$input" | jq -r '.file_path // .path // empty')
    
    [[ -z "$content" ]] && echo '{"permission": "allow", "continue": true}' && exit 0
    
    # Skip check for known safe files
    if [[ "$file_path" =~ \.(md|txt|json|yaml|yml)$ ]] && [[ "$file_path" =~ (docs/|examples/|README) ]]; then
      echo '{"permission": "allow", "continue": true}'
      exit 0
    fi
    
    # Detect common secret patterns
    if echo "$content" | grep -qiE '(api[_-]?key|password|secret|token|private[_-]?key|access[_-]?key|auth[_-]?token).*[:=].*[A-Za-z0-9+/]{20,}'; then
      echo '{"permission": "deny", "userMessage": "❌ Blocked: Potential secret detected (AGENTS.md §Forbidden Actions). Use environment variables or config files.", "continue": false}'
      exit 0
    fi
    
    # Detect AWS keys
    if echo "$content" | grep -qE 'AKIA[0-9A-Z]{16}'; then
      echo '{"permission": "deny", "userMessage": "❌ Blocked: AWS access key detected", "continue": false}'
      exit 0
    fi
    
    # Detect private keys
    if echo "$content" | grep -qE '-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'; then
      echo '{"permission": "deny", "userMessage": "❌ Blocked: Private key detected", "continue": false}'
      exit 0
    fi
    
    # Allow write
    echo '{"permission": "allow", "continue": true}'
    exit 0
